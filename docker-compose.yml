version: '3.9'

services:

  mongodb:
    image: mongo:latest
    container_name: mongodb
    restart: always

    ports:
      - "27017:27017"

    volumes:
      - mongo-data:/data/db

  fastapi-app:
    build: .

    container_name: fastapi-app

    ports:
      - "8000:8000"

    environment:
      - MONGO_URI=mongodb://mongodb:27017

    depends_on:
      - mongodb

volumes:
  mongo-data: